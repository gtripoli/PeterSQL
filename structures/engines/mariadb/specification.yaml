        | +----------------------+ |                    1 | +----------------------+
    - sql: 'Connection 2:'
      result: SELECT GET_LOCK('lock2',10); +----------------------+ | GET_LOCK('lock2',10)
        | +----------------------+ |                    1 | +----------------------+
    - sql: 'Connection 1:'
      result: SELECT RELEASE_LOCK('lock1'), RELEASE_LOCK('lock2'), RELEASE_LOCK('lock3');
        +-----------------------+-----------------------+-----------------------+
        | RELEASE_LOCK('lock1') | RELEASE_LOCK('lock2') | RELEASE_LOCK('lock3') |
