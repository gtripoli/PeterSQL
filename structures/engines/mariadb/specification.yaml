      +-----------------------------------+-----------------+-----------------------+
      | OBJECT                            | JSON object     | {"key":"value"}       |
      +-----------------------------------+-----------------+-----------------------+
      | BOOLEAN                           | JSON            | true, false           |
      |                                   | true/false      |                       |
      |                                   | literals        |                       |
      +-----------------------------------+-----------------+-----------------------+
      | DOUBLE                            | A number with   | 1.2                   |
      |                                   | at least one    |                       |
      |                                   | floating point  |                       |
      |                                   | decimal.        |                       |
      +-----------------------------------+-----------------+-----------------------+
      | INTEGER                           | A number        | 1                     |
      |                                   | without a       |                       |
      |                                   | floating point  |                       |
      |                                   | decimal.        |                       |
      +-----------------------------------+-----------------+-----------------------+
      | NULL                              | JSON null       | null                  |
      |                                   | literal (this   |                       |
      |                                   | is returned as  |                       |
      |                                   | a string, not   |                       |
      |                                   | to be confused  |                       |
      |                                   | with the SQL    |                       |
