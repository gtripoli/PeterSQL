        |          | NULL            | +----------+-----------------+
    - sql: 'From MariaDB 10.3.6, with SQL_MODE=Oracle set:'
      result: SELECT TRIM(''),TRIM_ORACLE(''); +----------+-----------------+ | TRIM('')
        | TRIM_ORACLE('') | +----------+-----------------+ | NULL     | NULL            |
        +----------+-----------------+
