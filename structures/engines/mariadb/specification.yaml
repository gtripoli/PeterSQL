    aliases: []
    signature:
      display: TRIM([{BOTH | LEADING | TRAILING} [remstr] FROM] str)
      args:
      - name: '[{BOTH | LEADING | TRAILING} [remstr] FROM] str'
        optional: false
        type: any
    summary: Returns the string str with all remstr prefixes or suffixes removed.
    description: Returns the string str with all remstr prefixes or suffixes removed.
      If none of the specifiers BOTH, LEADING, or TRAILING is given, BOTH is assumed.
      remstr is optional and, if not specified, spaces are removed. Returns NULL if
      given a NULL argument. If the result is empty, returns either an empty string,
      or, from MariaDB 10.3.6 with SQL_MODE=Oracle, NULL. SQL_MODE=Oracle is not set
      by default. The Oracle mode version of the function can be accessed in any mode
      by using TRIM_ORACLE as the function name.
    examples:
