        3), e real);
      result: INSERT INTO t1 VALUES
    - sql: "( 2, 0, 2,    'two',    0.2,  0.002),\n ( 3, 0, 3,    'three',  0.3, \
        \ 0.003),\n ( 4, 1, 2,    'three',  0.4,  0.004),\n ( 5, 1, 1,    'two', \
        \   0.5,  0.005),\n ( 6, 1, 1,    'one',    0.6,  0.006),\n ( 7, 2, NULL,\
