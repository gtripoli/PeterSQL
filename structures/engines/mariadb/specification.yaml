    - sql: 'TRIM(LEADING ''x'' FROM ''xxxbarxxx''): barxxx'
      result: SELECT TRIM(BOTH 'x' FROM 'xxxbarxxx')\G
    - sql: 'TRIM(BOTH ''x'' FROM ''xxxbarxxx''): bar'
      result: SELECT TRIM(TRAILING 'xyz' FROM 'barxxyz')\G
    - sql: 'TRIM(TRAILING ''xyz'' FROM ''barxxyz''): barx'
      result: 'From MariaDB 10.3.6, with SQL_MODE=Oracle not set:'
    - sql: SELECT TRIM(''),TRIM_ORACLE('');
