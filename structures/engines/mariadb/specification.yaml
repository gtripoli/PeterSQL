      result: +----------------------------------------------------+ | JSON_OVERLAPS('true','["abc",
        1, 2, true, false]') | +----------------------------------------------------+
        | 1                                                  | +----------------------------------------------------+
    - sql: 'SELECT JSON_OVERLAPS(''{"A": 1, "B": {"C":2}}'', ''{"A": 2, "B": {"C":2}}'')
