    - sql: "DENSE_RANK() OVER (PARTITION BY course ORDER BY mark DESC) AS dense_rank,\n\
        \ ROW_NUMBER() OVER (PARTITION BY course ORDER BY mark DESC) AS row_num,\n\
        \ course, mark, name\nFROM student ORDER BY course, mark DESC;"
