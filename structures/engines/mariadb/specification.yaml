    summary: A timestamp in the format YYYY-MM-DD HH:MM:SS.
    description: "A timestamp in the format YYYY-MM-DD HH:MM:SS.ffffff.\n\nThe timestamp\
      \ field is generally used to define at which moment in time a row\nwas added\
      \ or updated and by default will automatically be assigned the current\ndatetime\
      \ when a record is inserted or updated. The automatic properties only\napply\
      \ to the first TIMESTAMP in the record; subsequent TIMESTAMP columns will\n\
      not be changed.\n\nMariaDB includes the --mysql56-temporal-format option, on\
      \ by default, which\nallows MariaDB to store TIMESTAMPs using the same low-level\
      \ format MySQL 5.6\nuses.\n\nFor more information, see Internal Format.\n\n\
      Supported Values\n----------------\n\nMariaDB stores values that use the TIMESTAMP\
      \ data type as the number of\nseconds since '1970-01-01 00:00:00' (UTC). This\
      \ means that the TIMESTAMP data\ntype can hold values between '1970-01-01 00:00:01'\
      \ (UTC) and '2038-01-19\n03:14:07' (UTC) (MariaDB 11.3 and earlier, 32-bit platforms\
      \ ) or '2106-02-07\n06:28:15 UTC' (from MariaDB 11.4.0, 64-bit platforms only).\n\
      \nMariaDB can also store microseconds with a precision between 0 and 6. If no\n\
      microsecond precision is specified, then 0 is used by default.\n\nAutomatic\
      \ Values\n----------------\n\nMariaDB has special behavior for the first column\
      \ that uses the TIMESTAMP data\ntype in a specific table when the system variable\n\
      explicit_defaults_for_timestamp is not set (which is the default until MariaDB\n\
      10.10). For the first column that uses the TIMESTAMP data type in a specific\n\
      table, MariaDB automatically assigns the following properties to the column:\n\
      \n* DEFAULT CURRENT_TIMESTAMP\n* ON UPDATE CURRENT_TIMESTAMP\n\nThis means that\
      \ if the column is not explicitly assigned a value in an INSERT\nor UPDATE query,\
      \ then MariaDB will automatically initialize the column's value\nwith the current\
      \ date and time.\n\nThis automatic initialization for INSERT and UPDATE queries\
      \ can also be\nexplicitly enabled for a column that uses the TIMESTAMP data\
      \ type by\nspecifying the DEFAULT CURRENT_TIMESTAMP and ON UPDATE CURRENT_TIMESTAMP\n\
      clauses for the column. In these clauses, any synonym of CURRENT_TIMESTAMP is\n\
      accepted, including CURRENT_TIMESTAMP(), NOW(), LOCALTIME, LOCALTIME(),\nLOCALTIMESTAMP,\
      \ and LOCALTIMESTAMP().\n\nThis automatic initialization for INSERT queries\
      \ can also be explicitly\n ..."
    examples: []
