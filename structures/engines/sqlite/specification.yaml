    tags: []
    aliases: []
    summary: The instr(X,Y) function finds the first occurrence of string Y within
    description: 'The instr(X,Y) function finds the first occurrence of string Y within
      string X and returns the number of prior characters plus 1, or 0 if Y is
      nowhere found within X. Or, if X and Y are both BLOBs, then instr(X,Y)
      returns one more than the number bytes prior to the first occurrence of Y,
      or 0 if Y does not occur anywhere within X. If both arguments X and Y to
      instr(X,Y) are non-NULL and are not BLOBs then both are interpreted as
      strings. If either X or Y are NULL in instr(X,Y) then the result is NULL.'
    examples: []
