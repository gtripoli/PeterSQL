    tags: []
    aliases: []
    summary: For a string value X, the length(X) function returns the number of
    description: 'For a string value X, the length(X) function returns the number
      of
      characters (not bytes) in X prior to the first NUL character. Since SQLite
      strings do not normally contain NUL characters, the length(X) function will
      usually return the total number of characters in the string X. For a blob
      value X, length(X) returns the number of bytes in the blob. If X is NULL
      then length(X) is NULL. If X is numeric then length(X) returns the length
      of a string representation of X.'
    examples: []
  - name: LIKE1
    category_id: scalar_sql_functions
    category_label: Scalar SQL Functions
    signature:
      display: LIKE1(X,Y)
      args:
      - name: X
        optional: false
        type: any
      - name: Y
        optional: false
        type: any
    tags: []
    aliases: []
    summary: The like() function is used to implement the "Y LIKE X &#91;ESCAPE Z&#93;"
    description: 'The like() function is used to implement the "Y LIKE X &#91;ESCAPE
      Z&#93;"
      expression. If the optional ESCAPE clause is present, then the like()
      function is invoked with three arguments. Otherwise, it is invoked with two
      arguments only. Note that the X and Y parameters are reversed in the like()
      function relative to the infix LIKE operator. X is the pattern and Y is the
      string to match against that pattern. Hence, the following expressions are
      equivalent: name LIKE ''%neon%'' like(''%neon%'',name) The
      sqlite3_create_function() interface can be used to override the like()
      function and thereby change the operation of the LIKE operator. When
      overriding the like() function, it may be important to override both the
      two and three argument versions of the like() function. Otherwise,
      different code may be called to implement the LIKE operator depending on
      whether or not an ESCAPE clause was specified.'
    examples: []
