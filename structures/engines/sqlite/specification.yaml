  - name: LIKELIHOOD
    category_id: scalar_sql_functions
    category_label: Scalar SQL Functions
    signature:
      display: LIKELIHOOD(X,Y)
      args:
      - name: X
        optional: false
        type: any
      - name: Y
        optional: false
        type: any
    tags: []
    aliases: []
    summary: The likelihood(X,Y) function returns argument X unchanged.
    description: 'The likelihood(X,Y) function returns argument X unchanged. The value
      Y in
      likelihood(X,Y) must be a floating point constant between 0.0 and 1.0,
      inclusive. The likelihood(X) function is a no-op that the code generator
      optimizes away so that it consumes no CPU cycles during run-time (that is,
      during calls to sqlite3_step()). The purpose of the likelihood(X,Y)
      function is to provide a hint to the query planner that the argument X is a
      boolean that is true with a probability of approximately Y. The unlikely(X)
      function is short-hand for likelihood(X,0.0625). The likely(X) function is
      short-hand for likelihood(X,0.9375).'
    examples: []
  - name: LIKELY
