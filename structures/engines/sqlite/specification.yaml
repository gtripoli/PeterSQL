    summary: The glob(X,Y) function is equivalent to the expression "Y GLOB X".
    description: 'The glob(X,Y) function is equivalent to the expression "Y GLOB X".
      Note
      that the X and Y arguments are reversed in the glob() function relative to
      the infix GLOB operator. Y is the string and X is the pattern. So, for
      example, the following expressions are equivalent: name GLOB ''*helium*''
      glob(''*helium*'',name) If the sqlite3_create_function() interface is used to
      override the glob(X,Y) function with an alternative implementation then the
      GLOB operator will invoke the alternative implementation.'
