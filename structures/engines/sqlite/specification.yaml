    tags: []
    aliases: []
    summary: The load_extension(X,Y) function loads SQLite extensions out of the shared
    description: 'The load_extension(X,Y) function loads SQLite extensions out of
      the shared
      library file named X using the entry point Y. The result of
      load_extension() is always a NULL. If Y is omitted then the default entry
      point name is used. The load_extension() function raises an exception if
      the extension fails to load or initialize correctly. The load_extension()
      function will fail if the extension attempts to modify or delete an SQL
      function or collating sequence. The extension can add new functions or
      collating sequences, but cannot modify or delete existing functions or
      collating sequences because those functions and/or collating sequences
      might be used elsewhere in the currently running SQL statement. To load an
      extension that changes or deletes functions or collating sequences, use the
      sqlite3_load_extension() C-language API.
      For security reasons, extension
      loaded is turned off by default and must be enabled by a prior call to
      sqlite3_enable_load_extension().'
    examples: []
