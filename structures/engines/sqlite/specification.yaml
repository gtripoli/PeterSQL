      consumes no CPU cycles at run-time (that is, during calls to
      sqlite3_step()). The purpose of the unlikely(X) function is to provide a
      hint to the query planner that the argument X is a boolean value that is
      usually not true. The unlikely(X) function is equivalent to likelihood(X,
