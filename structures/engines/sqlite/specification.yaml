    description: 'The likely(X) function returns the argument X unchanged. The likely(X)
      function is a no-op that the code generator optimizes away so that it
      consumes no CPU cycles at run-time (that is, during calls to
      sqlite3_step()). The purpose of the likely(X) function is to provide a hint
      to the query planner that the argument X is a boolean value that is usually
      true. The likely(X) function is equivalent to likelihood(X,0.9375). See
      also: unlikely(X).'
    examples: []
  - name: LOAD_EXTENSION1
