  - name: PG_HAS_ROLE
    category_id: session_information_functions
    category_label: Session Information Functions
    signature:
      display: PG_HAS_ROLE([ user name or oid, ] role text or oid, privilege text)
      args:
      - name: '[ user name or oid'
        optional: false
        type: any
      - name: '] role text or oid'
        optional: false
        type: any
      - name: privilege text
        optional: false
        type: any
    tags: []
    aliases: []
    summary: Does user have privilege for role?
    description: 'Does user have privilege for role? Allowable privilege types are
      MEMBER,
      USAGE, and SET. MEMBER denotes direct or indirect membership in the role
      without regard to what specific privileges may be conferred. USAGE denotes
      whether the privileges of the role are immediately available without doing
      SET ROLE, while SET denotes whether it is possible to change to the role
      using the SET ROLE command. WITH ADMIN OPTION or WITH GRANT OPTION can be
      added to any of these privilege types to test whether the ADMIN privilege
      is held (all six spellings test the same thing). This function does not
      allow the special case of setting user to public, because the PUBLIC
      pseudo-role can never be a member of real roles.'
    examples: []
