    summary: Constructs an aclitem array holding the default access privileges for
      an
    description: 'Constructs an aclitem array holding the default access privileges
      for an
      object of type type belonging to the role with OID ownerId. This represents
      the access privileges that will be assumed when an object''s ACL entry is
      null. (The default access privileges are described in Section 5.8.) The
      type parameter must be one of ''c'' for COLUMN, ''r'' for TABLE and table-like
      objects, ''s'' for SEQUENCE, ''d'' for DATABASE, ''f'' for FUNCTION or PROCEDURE,
      ''l'' for LANGUAGE, ''L'' for LARGE OBJECT, ''n'' for SCHEMA, ''p'' for PARAMETER,
      ''t'' for TABLESPACE, ''F'' for FOREIGN DATA WRAPPER, ''S'' for FOREIGN SERVER,
      or ''T'' for TYPE or DOMAIN.'
