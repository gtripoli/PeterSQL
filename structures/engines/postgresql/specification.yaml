      summarizer has never run since the instance was started, then
      summarized_tli and summarized_lsn will be 0 and 0/0 respectively;
      otherwise, they will be the TLI and ending LSN of the last WAL summary file
      written to disk. If the WAL summarizer is currently running, pending_lsn
      will be the ending LSN of the last record that it has consumed, which must
      always be greater than or equal to summarized_lsn; if the WAL summarizer is
      not running, it will be equal to summarized_lsn. summarizer_pid is the PID
      of the WAL summarizer process, if it is running, and otherwise NULL.'
