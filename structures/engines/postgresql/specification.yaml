    tags: []
    aliases: []
    summary: Returns the name of the sequence associated with a column, or NULL if
      no
    description: 'Returns the name of the sequence associated with a column, or NULL
      if no
      sequence is associated with the column. If the column is an identity
      column, the associated sequence is the sequence internally created for that
      column. For columns created using one of the serial types (serial,
      smallserial, bigserial), it is the sequence created for that serial column
      definition. In the latter case, the association can be modified or removed
      with ALTER SEQUENCE OWNED BY. (This function probably should have been
      called pg_get_owned_sequence; its current name reflects the fact that it
      has historically been used with serial-type columns.) The first parameter
      is a table name with optional schema, and the second parameter is a column
      name. Because the first parameter potentially contains both schema and
      table names, it is parsed per usual SQL rules, meaning it is lower-cased by
      default. The second parameter, being just a column name, is treated
      literally and so has its case preserved. The result is suitably formatted
      for passing to the sequence functions (see Section 9.17).'
    examples: []
