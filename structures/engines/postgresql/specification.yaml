    summary: Creates a new logical (decoding) replication slot named slot_name using
      the
    description: 'Creates a new logical (decoding) replication slot named slot_name
      using the
      output plugin plugin. The optional third parameter, temporary, when set to
      true, specifies that the slot should not be permanently stored to disk and
      is only meant for use by the current session. Temporary slots are also
      released upon any error. The optional fourth parameter, twophase, when set
      to true, specifies that the decoding of prepared transactions is enabled
      for this slot. The optional fifth parameter, failover, when set to true,
      specifies that this slot is enabled to be synced to the standbys so that
