      This function executes as a window function if over_clause is present.
      over_clause is as described in
      https://dev.mysql.com/doc/refman/8.3/en/window-functions-usage.html; it
      cannot be used with DISTINCT.
      URL: https://dev.mysql.com/doc/refman/8.3/en/aggregate-functions.html'
