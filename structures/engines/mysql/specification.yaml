    signature:
      display: ABS(X)
      args:
      - name: X
        optional: false
        type: any
    tags: []
    aliases: []
    summary: Returns the absolute value of X, or NULL if X is NULL.
    description: 'Returns the absolute value of X, or NULL if X is NULL.
      The result type is derived from the argument type. An implication of
      this is that ABS(-9223372036854775808) produces an error because the
      result cannot be stored in a signed BIGINT value.
      URL: https://dev.mysql.com/doc/refman/8.3/en/mathematical-functions.html'
    examples: []
