window:
  size: 1920,1048
  position: 0,0
appearance:
  theme: petersql
  mode: auto
shortcuts:
  autocomplete:
    force_show: Ctrl+Space
    complete: Tab,Enter
    cancel: Escape
  query_editor:
    execute: F5
    execute_selection: Ctrl+Enter
settings:
  autocomplete:
    debounce_ms: 80
    min_prefix_length: 1
    add_space_after_completion: true
    popup_width: 300
    popup_max_height: 10
language: it_IT
query_editor:
  statement_separator: ;
  trim_whitespace: false
  execute_selected_only: false
  autocomplete: true
  autoformat: true
advanced:
  connection_timeout: 10
  query_timeout: 10
  logging_level: INFO
