name: CI

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

env:
  WX_VERSION: "4.2.5"
  PYTHON_VERSION: "3.14"
  UV_CACHE_DIR: /home/runner/.cache/uv
  PIP_CACHE_DIR: /home/runner/.cache/pip
  WHEEL_CACHE_DIR: /home/runner/.cache/wheels
  # Disable the Ryuk resource-reaper sidecar: it needs privileged Docker access
  # which is unavailable in standard GitHub Actions runners and in act.
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build the wxPython wheel once and cache it with a stable key.
  # The key is tied to OS + Python version + wxPython version only, so
  # bumping any other dependency in uv.lock will never bust this cache.
  # ─────────────────────────────────────────────────────────────────────────
  build-wxpython:
    if: github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Restore wxPython wheel cache
        id: wx_cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WHEEL_CACHE_DIR }}
          key: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.WX_VERSION }}

      - name: Cache pip (wxPython source tarball)
        if: steps.wx_cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-wx-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.WX_VERSION }}

      - name: Set up Python
        if: steps.wx_cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install wx build deps
        if: steps.wx_cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config gettext \
            xvfb \
            libgtk-3-dev libglib2.0-dev \
            libcairo2-dev libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            libjpeg-dev libpng-dev libtiff-dev libtiff6 \
            libnotify-dev libsm-dev \
            libsdl2-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libglu1-mesa-dev freeglut3-dev \
            libx11-dev libxext-dev libxinerama-dev libxi-dev libxrandr-dev \
            libxrender-dev libxcomposite-dev libxdamage-dev libxfixes-dev \
            libxss-dev libxtst-dev

          if ! sudo apt-get install -y libwebkit2gtk-4.0-dev; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          fi

      - name: Verify GTK+ (build diagnostics)
        if: steps.wx_cache.outputs.cache-hit != 'true'
        run: |
          pkg-config --modversion gtk+-3.0
          pkg-config --cflags --libs gtk+-3.0

      - name: Build wxPython wheel
        if: steps.wx_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${WHEEL_CACHE_DIR}"
          pip install wheel
          if ! xvfb-run python -m pip wheel -w "${WHEEL_CACHE_DIR}" "wxpython==${{ env.WX_VERSION }}"; then
            echo "::error::wxPython wheel build failed — dumping config.log for diagnosis."
            echo "=== Searching for config.log under /tmp, UV_CACHE_DIR, PIP_CACHE_DIR, GITHUB_WORKSPACE ==="
            find /tmp "${UV_CACHE_DIR}" "${PIP_CACHE_DIR}" "${GITHUB_WORKSPACE}" \
              -name "config.log" 2>/dev/null | head -20 | \
              while IFS= read -r f; do
                echo "=== $f ==="
                tail -100 "$f"
                echo ""
              done
            exit 1
          fi

      - name: Upload wxPython wheel as artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEEL_CACHE_DIR }}/wxpython-*.whl
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Run the test suite on every push to non-main branches and on PRs.
  # ─────────────────────────────────────────────────────────────────────────
  test:
    needs: build-wxpython
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
          enable-cache: true
          cache-local-path: ${{ env.UV_CACHE_DIR }}
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libsdl2-2.0-0

      - name: Restore wxPython wheel
        uses: actions/cache@v4
        with:
          path: ${{ env.WHEEL_CACHE_DIR }}
          key: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.WX_VERSION }}

      - name: Download wxPython wheel artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEEL_CACHE_DIR }}

      - name: Initialize venv
        run: uv venv

      - name: Verify wxPython wheel
        run: |
          echo "=== Wheelhouse contents ==="
          ls -la "${WHEEL_CACHE_DIR}"
          if ! ls "${WHEEL_CACHE_DIR}"/wxpython-*.whl 2>/dev/null | grep -q .; then
            echo "::error::wxPython wheel not found in ${WHEEL_CACHE_DIR}. Failing fast — no source build allowed."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --extra dev --find-links "${WHEEL_CACHE_DIR}" --no-install-package wxpython

      - name: Install wxPython from local wheel
        run: uv pip install --no-index --find-links "${WHEEL_CACHE_DIR}" "wxpython==${{ env.WX_VERSION }}"

      - name: Run tests
        run: xvfb-run -a uv run --no-sync ./scripts/runtest.py

  # ─────────────────────────────────────────────────────────────────────────
  # Run tests and commit updated README on every push to main.
  # ─────────────────────────────────────────────────────────────────────────
  update:
    needs: build-wxpython
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest
          enable-cache: true
          cache-local-path: ${{ env.UV_CACHE_DIR }}
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libsdl2-2.0-0

      - name: Restore wxPython wheel
        uses: actions/cache@v4
        with:
          path: ${{ env.WHEEL_CACHE_DIR }}
          key: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.WX_VERSION }}

      - name: Download wxPython wheel artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: wxpython-wheel-${{ runner.os }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.WHEEL_CACHE_DIR }}

      - name: Initialize venv
        run: uv venv

      - name: Verify wxPython wheel
        run: |
          echo "=== Wheelhouse contents ==="
          ls -la "${WHEEL_CACHE_DIR}"
          if ! ls "${WHEEL_CACHE_DIR}"/wxpython-*.whl 2>/dev/null | grep -q .; then
            echo "::error::wxPython wheel not found in ${WHEEL_CACHE_DIR}. Failing fast — no source build allowed."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --extra dev --find-links "${WHEEL_CACHE_DIR}" --no-install-package wxpython

      - name: Install wxPython from local wheel
        run: uv pip install --no-index --find-links "${WHEEL_CACHE_DIR}" "wxpython==${{ env.WX_VERSION }}"

      - name: Run tests and update README
        run: xvfb-run -a uv run --no-sync ./scripts/runtest.py

      - name: Commit and push updated README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit"
          else
            git commit -m "chore: update badges [skip ci]"
            git push
          fi

      - name: Build (placeholder)
        run: echo "Build scripts are not ready yet."

  # ─────────────────────────────────────────────────────────────────────────
  # Release flow — temporarily disabled.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    if: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build (placeholder)
        run: echo "Build scripts are not ready yet."

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text()); project = data.get('project', {}); version = project.get('version', '').strip(); print(version) if version else (_ for _ in ()).throw(SystemExit('Missing project.version in pyproject.toml'))")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Create published release with autogenerated notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" --generate-notes --title "$tag"
          fi
